<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: {{SIZE}}px;
      height: {{SIZE}}px;
      background: #059669;
      border-radius: {{RADIUS}}px;
      overflow: hidden;
    }

      width: {{SIZE}}px;
      height: {{SIZE}}px;
      background: #059669;
      display: flex;

      justify-content: center;
    }
    .login-header-icon i {
      color: #ffffff;
      font-size: {{GLYPH}}px;
      line-height: 1;
    }

</head>
