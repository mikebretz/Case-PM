{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Companies / Vendors</h1>
            <p class="text-zinc-400 mt-1">Manage subcontractors, suppliers, and vendors</p>
        </div>
        
        <button onclick="showAddCompanyModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>Add Company</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="companySearch" placeholder="Search companies..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterCompanies()">
        </div>

        <select id="typeFilter" onchange="filterCompanies()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Types</option>
            <option value="Subcontractor">Subcontractor</option>
            <option value="Supplier">Supplier</option>
            <option value="Vendor">Vendor</option>
            <option value="Consultant">Consultant</option>
        </select>

        <select id="statusFilter" onchange="filterCompanies()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Pending">Pending</option>
        </select>

        <button onclick="clearCompanyFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Companies Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Company Name</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Type</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Primary Contact</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Phone</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Email</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">COI Status</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="companiesTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Add / Edit Company Modal -->
        <dialog id="companyModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-2xl shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">Add New Company</div>
                    <button onclick="document.getElementById('companyModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="companyForm" onsubmit="saveCompany(event)">
                    <input type="hidden" id="companyId">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm text-zinc-400 mb-1.5">Company Name</label>
                            <input type="text" id="company_name" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Company Type</label>
                            <select id="company_type" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="Subcontractor">Subcontractor</option>
                                <option value="Supplier">Supplier</option>
                                <option value="Vendor">Vendor</option>
                                <option value="Consultant">Consultant</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Status</label>
                            <select id="status" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Pending">Pending</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Primary Contact - First Name</label>
                            <input type="text" id="contact_first_name" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Primary Contact - Last Name</label>
                            <input type="text" id="contact_last_name" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Phone Number</label>
                            <input type="tel" id="phone"
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Email</label>
                            <input type="email" id="email" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm text-zinc-400 mb-1.5">Address</label>
                            <input type="text" id="address"
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('companyModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Company
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
        <!-- JavaScript -->
        <script>
            // Sample data (will be replaced with backend later)
            let companies = [
                {
                    id: 1,
                    name: "ABC Concrete LLC",
                    type: "Subcontractor",
                    contact_first_name: "Robert",
                    contact_last_name: "Miller",
                    phone: "813-555-0192",
                    email: "rmiller@abcconcrete.com",
                    status: "Active"
                },
                {
                    id: 2,
                    name: "PowerTech Electric Inc.",
                    type: "Subcontractor",
                    contact_first_name: "James",
                    contact_last_name: "Torres",
                    phone: "727-555-0187",
                    email: "jtorres@powertech.com",
                    status: "Active"
                },
                {
                    id: 3,
                    name: "Gulf Coast Supplies",
                    type: "Supplier",
                    contact_first_name: "Maria",
                    contact_last_name: "Santos",
                    phone: "941-555-0144",
                    email: "msantos@gulfcoastsupplies.com",
                    status: "Active"
                }
            ];

            function filterCompanies() {
                const searchTerm = document.getElementById('companySearch').value.toLowerCase();
                const typeFilter = document.getElementById('typeFilter').value;
                const statusFilter = document.getElementById('statusFilter').value;

                const filtered = companies.filter(company => {
                    const matchesSearch = company.name.toLowerCase().includes(searchTerm);
                    const matchesType = !typeFilter || company.type === typeFilter;
                    const matchesStatus = !statusFilter || company.status === statusFilter;
                    return matchesSearch && matchesType && matchesStatus;
                });

                renderCompaniesTable(filtered);
            }

            function clearCompanyFilters() {
                document.getElementById('companySearch').value = '';
                document.getElementById('typeFilter').value = '';
                document.getElementById('statusFilter').value = '';
                renderCompaniesTable(companies);
            }

            function renderCompaniesTable(companyList) {
                const tbody = document.getElementById('companiesTableBody');
                tbody.innerHTML = '';

                if (companyList.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-zinc-400">
                                No companies found.
                            </td>
                        </tr>
                    `;
                    return;
                }

                companyList.forEach(company => {
                    const statusColor = 
                        company.status === 'Active' ? 'bg-emerald-600/20 text-emerald-400' :
                        company.status === 'Inactive' ? 'bg-zinc-600/20 text-zinc-400' :
                        'bg-amber-600/20 text-amber-400';

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-zinc-800/60 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium">${company.name}</td>
                        <td class="px-6 py-4">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium bg-zinc-700 text-zinc-300">
                                ${company.type}
                            </span>
                        </td>
                        <td class="px-6 py-4">${company.contact_first_name} ${company.contact_last_name}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${company.phone}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${company.email}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${statusColor}">
                                ${company.status}
                            </span>
                        </td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1">
                                <button onclick="editCompany(${company.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-edit"></i>
                                </button>
                                <button onclick="deleteCompany(${company.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function showAddCompanyModal() {
                document.getElementById('modalTitle').innerText = 'Add New Company';
                document.getElementById('companyForm').reset();
                document.getElementById('companyId').value = '';
                document.getElementById('companyModal').showModal();
            }

            function editCompany(id) {
                const company = companies.find(c => c.id === id);
                if (!company) return;

                document.getElementById('modalTitle').innerText = 'Edit Company';
                document.getElementById('companyId').value = company.id;
                document.getElementById('company_name').value = company.name;
                document.getElementById('company_type').value = company.type;
                document.getElementById('status').value = company.status;
                document.getElementById('contact_first_name').value = company.contact_first_name;
                document.getElementById('contact_last_name').value = company.contact_last_name;
                document.getElementById('phone').value = company.phone || '';
                document.getElementById('email').value = company.email;

                document.getElementById('companyModal').showModal();
            }

            function saveCompany(e) {
                e.preventDefault();

                const id = document.getElementById('companyId').value;

                const newCompany = {
                    id: id ? parseInt(id) : Date.now(),
                    name: document.getElementById('company_name').value,
                    type: document.getElementById('company_type').value,
                    status: document.getElementById('status').value,
                    contact_first_name: document.getElementById('contact_first_name').value,
                    contact_last_name: document.getElementById('contact_last_name').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value
                };

                if (id) {
                    const index = companies.findIndex(c => c.id == id);
                    companies[index] = newCompany;
                } else {
                    companies.push(newCompany);
                }

                renderCompaniesTable(companies);
                document.getElementById('companyModal').close();
            }

            function deleteCompany(id) {
                if (!confirm('Delete this company?')) return;
                companies = companies.filter(c => c.id !== id);
                renderCompaniesTable(companies);
            }

            function initializeCompanies() {
                renderCompaniesTable(companies);
            }

            // Initialize on load
            window.onload = function() {
                initializeCompanies();
            };
        </script>

{% endblock %}

</div>
</div>
