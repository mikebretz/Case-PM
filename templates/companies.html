// ==================== IMPROVED closeCompanyModalSafely (works for both Add & Edit) ====================
function closeCompanyModalSafely() {
    const modal = document.getElementById('companyModal');
    if (!modal) return;

    const companyName = document.getElementById('company_name') ? document.getElementById('company_name').value.trim() : '';

    if (!companyName && !originalCompanyData) {
        modal.close();
        return;
    }

    if (originalCompanyData) {
        const current = {
            company_name: document.getElementById('company_name').value.trim(),
            primary_phone: document.getElementById('primary_phone').value.trim(),
            primary_email: document.getElementById('primary_email').value.trim(),
            external_id: document.getElementById('external_id').value.trim(),
            tax_id: document.getElementById('tax_id').value.trim(),
            status: document.getElementById('status').value
        };

        const changed = 
            current.company_name !== (originalCompanyData.company_name || '') ||
            current.primary_phone !== (originalCompanyData.primary_phone || '') ||
            current.primary_email !== (originalCompanyData.primary_email || '') ||
            current.external_id !== (originalCompanyData.external_id || '') ||
            current.tax_id !== (originalCompanyData.tax_id || '') ||
            current.status !== (originalCompanyData.status || '');

        if (changed) {
            showConfirmModal("Unsaved Changes", "You have entered new information. Discard changes and close?", () => {
                modal.close();
                originalCompanyData = null;
            });
        } else {
            modal.close();
            originalCompanyData = null;
        }
        return;
    }

    if (companyName) {
        showConfirmModal("Unsaved Changes", "You have entered new information. Discard changes and close?", () => {
            modal.close();
        });
    } else {
        modal.close();
    }
}

// ==================== ROBUST LOGO DROP ZONE (Cancel in file explorer no longer closes modal) ====================
function setupLogoDropZone() {
    const dropZone = document.getElementById('logo_drop_zone');
    const fileInput = document.getElementById('company_logo');
    const preview = document.getElementById('logo_preview');

    if (!dropZone || !fileInput || !preview) return;

    dropZone.onclick = (e) => {
        e.stopImmediatePropagation();
        fileInput.click();
    };

    dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            previewLogo(e.dataTransfer.files[0]);
        }
    };

    fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
            previewLogo(fileInput.files[0]);
        }
        fileInput.value = '';
    };
}

function getStatusBadge(status, expiration) {
    if (!expiration) return `<span class="text-xs px-2 py-0.5 rounded bg-zinc-700">N/A</span>`;
    const expDate = new Date(expiration);
    const now = new Date();
    if (expDate < now) return `<span class="text-xs px-2 py-0.5 rounded bg-red-900/60 text-red-400">Expired</span>`;
    return `<span class="text-xs px-2 py-0.5 rounded bg-emerald-900/60 text-emerald-400">Current</span>`;
}

function getCOIStatus(cois) {
    if (!cois || cois.length === 0) return `<span class="text-xs px-2 py-0.5 rounded bg-zinc-700">N/A</span>`;
    const hasExpired = cois.some(c => new Date(c.expiration) < new Date());
    return hasExpired 
        ? `<span class="text-xs px-2 py-0.5 rounded bg-red-900/60 text-red-400">Expired</span>` 
        : `<span class="text-xs px-2 py-0.5 rounded bg-emerald-900/60 text-emerald-400">Current</span>`;
}

function updateSummaryCards() {
    const total = companies.length;
    const subs = companies.filter(c => c.company_type === 'Subcontractor').length;
    const suppliers = companies.filter(c => c.company_type === 'Supplier').length;
    const clients = companies.filter(c => c.company_type === 'Client').length;

    const now = new Date();
    const sixtyDays = new Date(now.getTime() + (60 * 24 * 60 * 60 * 1000));

    let expiring = 0, expiredIns = 0, expiredLic = 0;

    companies.forEach(c => {
        if (c.license_expiration && new Date(c.license_expiration) < now) expiredLic++;
        if (c.gl_expiration && new Date(c.gl_expiration) < now) expiredIns++;
        if (c.wc_expiration && new Date(c.wc_expiration) < now) expiredIns++;
        if (c.cois) c.cois.forEach(coi => {
            const d = new Date(coi.expiration);
            if (d < now) expiredIns++;
            else if (d < sixtyDays) expiring++;
        });
    });

    document.getElementById('totalCompanies').innerText = total;
    document.getElementById('subcontractorCount').innerText = subs;
    document.getElementById('supplierCount').innerText = suppliers;
    document.getElementById('clientCount').innerText = clients;
    document.getElementById('insuranceAlertCount').innerText = expiring;
    document.getElementById('expiredInsuranceCount').innerText = expiredIns;
    document.getElementById('expiredLicenseCount').innerText = expiredLic;
}

function filterExpiringInsurance() {
    document.getElementById('searchInput').value = '';
    document.getElementById('typeFilter').value = '';
    document.getElementById('statusFilter').value = '';
    const now = new Date();
    const sixty = new Date(now.getTime() + (60 * 24 * 60 * 60 * 1000));
    const filtered = companies.filter(c => {
        const gl = c.gl_expiration && new Date(c.gl_expiration) > now && new Date(c.gl_expiration) < sixty;
        const wc = c.wc_expiration && new Date(c.wc_expiration) > now && new Date(c.wc_expiration) < sixty;
        const coi = (c.cois || []).some(coi => {
            const d = new Date(coi.expiration);
            return d > now && d < sixty;
        });
        return gl || wc || coi;
    });
    renderCompaniesTable(filtered);
}
function filterExpiredInsurance() {
    document.getElementById('searchInput').value = '';
    document.getElementById('typeFilter').value = '';
    document.getElementById('statusFilter').value = '';
    const now = new Date();
    const filtered = companies.filter(c => {
        const glExpired = c.gl_expiration && new Date(c.gl_expiration) < now;
        const wcExpired = c.wc_expiration && new Date(c.wc_expiration) < now;
        const coiExpired = (c.cois || []).some(coi => new Date(coi.expiration) < now);
        return glExpired || wcExpired || coiExpired;
    });
    renderCompaniesTable(filtered);
}
function filterExpiredLicense() {
    document.getElementById('searchInput').value = '';
    document.getElementById('typeFilter').value = '';

function filterCompanies() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const type = document.getElementById('typeFilter').value;
    const status = document.getElementById('statusFilter').value;

    const filtered = companies.filter(c => {
        const matchSearch = c.company_name.toLowerCase().includes(search) || 
                           (c.trade && c.trade.toLowerCase().includes(search));
        const matchType = !type || c.company_type === type;
        const matchStatus = !status || c.status === status;
        return matchSearch && matchType && matchStatus;
    });
    renderCompaniesTable(filtered);
}

function exportCompanies(format) {
    if (companies.length === 0) {
        showAlertModal("No Data", "No companies to export.");
        return;
    }
    const data = companies.map(c => ({
        Company_Name: c.company_name,
        Type: c.company_type,
        Primary_Phone: c.primary_phone,
        Primary_Email: c.primary_email,
        External_Sage_ID: c.external_id,
        License_Status: c.license_status,
        GL_Expiration: c.gl_expiration,
        WC_Expiration: c.wc_expiration
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Companies");

    if (format === 'csv') {
        XLSX.writeFile(wb, "companies_export.csv");
    } else {
        XLSX.writeFile(wb, "companies_export.xlsx");
    }
}

function importCompanies(type) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = type === 'excel' ? '.xlsx,.xls' : '.csv';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(ev) {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            json.forEach(row => {
                companies.push({
                    id: Date.now() + Math.random(),
                    company_name: row.Company_Name || row.company_name || 'Unnamed',
                    company_type: row.Type || row.company_type || 'Supplier',
                    primary_phone: row.Primary_Phone || '',
                    primary_email: row.Primary_Email || '',
                    external_id: row.External_Sage_ID || '',
                    status: 'Active'
                });
            });
            localStorage.setItem('casepm_companies', JSON.stringify(companies));
            renderCompaniesTable(companies);
            showAlertModal("Import Complete", `${json.length} companies imported.`);
        };
        reader.readAsArrayBuffer(file);
    };

function saveCompany(e) {
    e.preventDefault();
    const companyName = document.getElementById('company_name').value.trim();
    if (!companyName) {
        showAlertModal("Validation Error", "Company Name is required.");
        return;
    }

    const contactRows = document.querySelectorAll('#contactsContainer .contact-row');
    let hasInvalidEmail = false;
    contactRows.forEach(row => {
        const authCheck = row.querySelector('.authorized-check');
        const emailInput = row.querySelector('.contact-email');
        if (authCheck && authCheck.checked) {
            if (!emailInput || !emailInput.value.trim() || !/^\S+@\S+\.\S+$/.test(emailInput.value.trim())) {
                hasInvalidEmail = true;
            }
        }
    });
    if (hasInvalidEmail) {
        showAlertModal("Invalid Email", "Authorized Case PM User requires a valid email address.");
        return;
    }

    const id = document.getElementById('companyId').value ? parseInt(document.getElementById('companyId').value) : Date.now();

    const newCompany = {
        id: id,
        company_name: companyName,
        company_type: document.getElementById('company_type').value,
        external_id: document.getElementById('external_id').value.trim(),
        primary_phone: document.getElementById('primary_phone').value.trim(),
        primary_email: document.getElementById('primary_email').value.trim(),
        tax_id: document.getElementById('tax_id').value.trim(),
        status: document.getElementById('status').value,
        billing_address: document.getElementById('billing_address').value.trim(),
        shipping_address: document.getElementById('shipping_address').value.trim(),
        license_number: document.getElementById('license_number').value.trim(),
        license_expiration: document.getElementById('license_expiration').value,
        license_status: document.getElementById('license_status').value,
        gl_carrier: document.getElementById('gl_carrier').value.trim(),
        gl_policy: document.getElementById('gl_policy').value.trim(),
        gl_expiration: document.getElementById('gl_expiration').value,
        wc_carrier: document.getElementById('wc_carrier').value.trim(),
        wc_policy: document.getElementById('wc_policy').value.trim(),
        wc_expiration: document.getElementById('wc_expiration').value,
        notes: document.getElementById('notes').value.trim(),
        contacts: [],
        cois: []
    };

    contactRows.forEach(row => {
        const name = row.querySelector('.contact-name').value.trim();
        if (name) {
            const contact = {
                name: name,
                title: row.querySelector('.contact-title').value.trim(),
                phone: row.querySelector('.contact-phone').value.trim(),
                email: row.querySelector('.contact-email').value.trim(),
                authorized_user: row.querySelector('.authorized-check').checked
            };
            newCompany.contacts.push(contact);

            if (contact.authorized_user && contact.email) {
                createAuthorizedCasePMUser(contact, id);
            }
        }
    });

    const coiRows = document.querySelectorAll('#coiContainer .coi-row');
    coiRows.forEach(row => {
        const carrier = row.querySelector('.coi-carrier').value.trim();
        if (carrier) {
            newCompany.cois.push({
                carrier: carrier,
                policy: row.querySelector('.coi-policy').value.trim(),
                expiration: row.querySelector('.coi-expiration').value
            });
        }
    });

    const index = companies.findIndex(c => c.id === id);
    if (index !== -1) {
        companies[index] = newCompany;
    } else {
        companies.push(newCompany);
    }

    localStorage.setItem('casepm_companies', JSON.stringify(companies));
    document.getElementById('companyModal').close();
    renderCompaniesTable(companies);
    showAlertModal("Success", "Company saved successfully. Authorized users added to User Management.");
}

function closeCompanyModalSafely() {
    const modal = document.getElementById('companyModal');
    if (!modal) return;

    const companyName = document.getElementById('company_name') ? document.getElementById('company_name').value.trim() : '';

    if (!companyName && !originalCompanyData) {
        modal.close();
        return;
    }

    if (originalCompanyData) {
        const current = {
            company_name: document.getElementById('company_name').value.trim(),
            primary_phone: document.getElementById('primary_phone').value.trim(),
            primary_email: document.getElementById('primary_email').value.trim(),
            external_id: document.getElementById('external_id').value.trim(),
            tax_id: document.getElementById('tax_id').value.trim(),
            status: document.getElementById('status').value
        };

        const changed = 
            current.company_name !== (originalCompanyData.company_name || '') ||
            current.primary_phone !== (originalCompanyData.primary_phone || '') ||
            current.primary_email !== (originalCompanyData.primary_email || '') ||
            current.external_id !== (originalCompanyData.external_id || '') ||
            current.tax_id !== (originalCompanyData.tax_id || '') ||
            current.status !== (originalCompanyData.status || '');

        if (changed) {
            showConfirmModal("Unsaved Changes", "You have entered new information. Discard changes and close?", () => {
                modal.close();
                originalCompanyData = null;
            });
        } else {
            modal.close();
            originalCompanyData = null;
        }
        return;
    }

    if (companyName) {
        showConfirmModal("Unsaved Changes", "You have entered new information. Discard changes and close?", () => {
            modal.close();
        });
    } else {
        modal.close();
    }
}

function setupLogoDropZone() {
    const dropZone = document.getElementById('logo_drop_zone');
    const fileInput = document.getElementById('company_logo');
    const preview = document.getElementById('logo_preview');

    if (!dropZone || !fileInput || !preview) return;

    dropZone.onclick = (e) => {
        e.stopImmediatePropagation();
        fileInput.click();
    };

    dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            previewLogo(e.dataTransfer.files[0]);
        }
    };

    fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
            previewLogo(fileInput.files[0]);
        }
        fileInput.value = '';
    };
}

function previewLogo(file) {
    const preview = document.getElementById('logo_preview');
    if (!preview || !file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
        preview.innerHTML = `<img src="${ev.target.result}" class="max-h-full max-w-full object-contain">`;
        preview.dataset.logoData = ev.target.result;
    };
    reader.readAsDataURL(file);
}

        const id = parseInt(cb.dataset.id);

function importSelectedFromSage() {
    const checked = document.querySelectorAll('.sage-checkbox:checked');
    if (!checked.length) {
        showAlertModal("No Selection", "Please select companies to import.");
        return;
    }

    checked.forEach(cb => {
        const id = parseInt(cb.dataset.id);
        const real = sageData.find(s => s.id === id);
        if (!real) return;

        const existing = companies.find(c => c.external_id === real.external_id);

        if (existing) {
            showConfirmModal(
                "Duplicate Found",
                `Company with External/Sage ID "${real.external_id}" already exists (${existing.company_name}). Merge new data?`,
                () => {
                    existing.company_name = real.company_name || existing.company_name;
                    existing.primary_phone = real.primary_phone || existing.primary_phone;
                    existing.primary_email = real.primary_email || existing.primary_email;
                    renderCompaniesTable(companies);
                }
            );
        } else {
            companies.push({
                id: Date.now() + Math.random(),
                ...real,
                contacts: [],
                cois: []
            });
        }
    });

    document.getElementById('sageSyncModal').close();
    renderCompaniesTable(companies);
    showAlertModal("Import Complete", "Companies processed from Sage 300.");
}

    const searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.addEventListener('input', filterCompanies);
    const typeFilter = document.getElementById('typeFilter');
    if (typeFilter) typeFilter.addEventListener('change', filterCompanies);
    const statusFilter = document.getElementById('statusFilter');
    if (statusFilter) statusFilter.addEventListener('change', filterCompanies);
}

window.onload = initializeCompaniesPage;
</script>
