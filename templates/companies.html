<!-- ==================== SUMMARY CARDS ==================== -->
<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 mb-6">
    
    <div onclick="filterAll()" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 cursor-pointer hover:border-zinc-700 transition-colors">
        <div class="text-xs text-zinc-400">TOTAL COMPANIES</div>
        <div id="totalCompanies" class="text-3xl font-semibold mt-1">0</div>
    </div>
    
    <div onclick="filterByType('Subcontractor')" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 cursor-pointer hover:border-zinc-700 transition-colors">
        <div class="text-xs text-zinc-400">SUBCONTRACTORS</div>
        <div id="subcontractorCount" class="text-3xl font-semibold mt-1">0</div>
    </div>
    
    <div onclick="filterByType('Supplier')" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 cursor-pointer hover:border-zinc-700 transition-colors">
        <div class="text-xs text-zinc-400">SUPPLIERS / VENDORS</div>
        <div id="supplierCount" class="text-3xl font-semibold mt-1">0</div>
    </div>
    
    <div onclick="filterByType('Client')" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 cursor-pointer hover:border-zinc-700 transition-colors">
        <div class="text-xs text-zinc-400">CLIENTS / OWNERS</div>
        <div id="clientCount" class="text-3xl font-semibold mt-1">0</div>
    </div>
    
    <div onclick="filterExpiringInsurance()" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 cursor-pointer hover:border-zinc-700 transition-colors">
        <div class="text-xs text-zinc-400">INSURANCE EXPIRING (60 DAYS)</div>
        <div id="insuranceAlertCount" class="text-3xl font-semibold mt-1">0</div>
    </div>
    
    <div onclick="filterExpiredInsurance()" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 cursor-pointer hover:border-zinc-700 transition-colors">
        <div class="text-xs text-zinc-400">EXPIRED INSURANCE</div>
        <div id="expiredInsuranceCount" class="text-3xl font-semibold mt-1">0</div>
    </div>
    
    <div onclick="filterExpiredLicense()" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 cursor-pointer hover:border-zinc-700 transition-colors">
        <div class="text-xs text-zinc-400">EXPIRED LICENSE</div>
        <div id="expiredLicenseCount" class="text-3xl font-semibold mt-1">0</div>
    </div>

</div>
