{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Pay Applications</h1>
            <p class="text-zinc-400 mt-1">Manage AIA-format progress billing</p>
        </div>
        
        <button onclick="showAddPayAppModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>New Pay Application</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="payAppSearch" placeholder="Search by number or contractor..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterPayApps()">
        </div>

        <select id="statusFilter" onchange="filterPayApps()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Draft">Draft</option>
            <option value="Submitted">Submitted</option>
            <option value="Approved">Approved</option>
            <option value="Paid">Paid</option>
        </select>

        <select id="projectFilter" onchange="filterPayApps()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Projects</option>
        </select>

        <button onclick="clearPayAppFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Pay Applications Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">App #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Period Ending</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Contractor</th>
                    <th class="text-right px-6 py-4 text-sm font-medium text-zinc-400">Amount</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Retainage</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="payAppTableBody" class="divide-y divide-zinc-800">
                <!-- Rows populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Add / Edit Pay Application Modal -->
        <dialog id="payAppModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-2xl shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">New Pay Application</div>
                    <button onclick="document.getElementById('payAppModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="payAppForm" onsubmit="savePayApplication(event)">
                    <input type="hidden" id="payAppId">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Application Number</label>
                            <input type="text" id="app_number" placeholder="e.g. APP-005" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Period Ending</label>
                            <input type="date" id="period_ending" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Contractor / Subcontractor</label>
                            <input type="text" id="contractor" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Project</label>
                            <select id="project_id" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="">Select Project</option>
                                <!-- Options can be populated dynamically later -->
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Current Payment Due</label>
                            <input type="number" id="current_amount" step="0.01" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Retainage (%)</label>
                            <input type="number" id="retainage_percent" value="10" step="0.01"
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Notes / Description</label>
                        <textarea id="notes" rows="3"
                                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('payAppModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Pay Application
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
