{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Pay Applications</h1>
            <p class="text-zinc-400 mt-1">Manage AIA-format progress billing</p>
        </div>
        
        <button onclick="showAddPayAppModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>New Pay Application</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="payAppSearch" placeholder="Search by number or contractor..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterPayApps()">
        </div>

        <select id="statusFilter" onchange="filterPayApps()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Draft">Draft</option>
            <option value="Submitted">Submitted</option>
            <option value="Approved">Approved</option>
            <option value="Paid">Paid</option>
        </select>

        <select id="projectFilter" onchange="filterPayApps()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Projects</option>
        </select>

        <button onclick="clearPayAppFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Pay Applications Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">App #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Period Ending</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Contractor</th>
                    <th class="text-right px-6 py-4 text-sm font-medium text-zinc-400">Amount</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Retainage</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="payAppTableBody" class="divide-y divide-zinc-800">
                <!-- Rows populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Add / Edit Pay Application Modal -->
        <dialog id="payAppModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-2xl shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">New Pay Application</div>
                    <button onclick="document.getElementById('payAppModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="payAppForm" onsubmit="savePayApplication(event)">
                    <input type="hidden" id="payAppId">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Application Number</label>
                            <input type="text" id="app_number" placeholder="e.g. APP-005" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Period Ending</label>
                            <input type="date" id="period_ending" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Contractor / Subcontractor</label>
                            <input type="text" id="contractor" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Project</label>
                            <select id="project_id" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="">Select Project</option>
                                <!-- Options can be populated dynamically later -->
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Current Payment Due</label>
                            <input type="number" id="current_amount" step="0.01" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Retainage (%)</label>
                            <input type="number" id="retainage_percent" value="10" step="0.01"
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Notes / Description</label>
                        <textarea id="notes" rows="3"
                                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('payAppModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Pay Application
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
        <!-- JavaScript -->
        <script>
            // Sample data (will be replaced with backend data later)
            let payApplications = [
                {
                    id: 1,
                    app_number: "APP-004",
                    period_ending: "2025-03-31",
                    contractor: "ABC Concrete LLC",
                    current_amount: 87500,
                    retainage_percent: 10,
                    status: "Approved"
                },
                {
                    id: 2,
                    app_number: "APP-005",
                    period_ending: "2025-04-30",
                    contractor: "Steel Dynamics LLC",
                    current_amount: 124300,
                    retainage_percent: 10,
                    status: "Submitted"
                }
            ];

            function filterPayApps() {
                const searchTerm = document.getElementById('payAppSearch').value.toLowerCase();
                const statusFilter = document.getElementById('statusFilter').value;

                const filtered = payApplications.filter(app => {
                    const matchesSearch = app.app_number.toLowerCase().includes(searchTerm) || 
                                        app.contractor.toLowerCase().includes(searchTerm);
                    const matchesStatus = !statusFilter || app.status === statusFilter;
                    return matchesSearch && matchesStatus;
                });

                renderPayAppTable(filtered);
            }

            function clearPayAppFilters() {
                document.getElementById('payAppSearch').value = '';
                document.getElementById('statusFilter').value = '';
                renderPayAppTable(payApplications);
            }

            function renderPayAppTable(apps) {
                const tbody = document.getElementById('payAppTableBody');
                tbody.innerHTML = '';

                if (apps.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-zinc-400">
                                No pay applications found.
                            </td>
                        </tr>
                    `;
                    return;
                }

                apps.forEach(app => {
                    const statusColor = 
                        app.status === 'Paid' ? 'bg-emerald-600/20 text-emerald-400' :
                        app.status === 'Approved' ? 'bg-blue-600/20 text-blue-400' :
                        app.status === 'Submitted' ? 'bg-amber-600/20 text-amber-400' :
                        'bg-zinc-600/20 text-zinc-400';

                    const retainageAmount = (app.current_amount * (app.retainage_percent / 100)).toFixed(2);
                    const totalDue = (app.current_amount - retainageAmount).toFixed(2);

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-zinc-800/60 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${app.app_number}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${app.period_ending}</td>
                        <td class="px-6 py-4">${app.contractor}</td>
                        <td class="px-6 py-4 text-right font-medium">$${app.current_amount.toLocaleString()}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${statusColor}">
                                ${app.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center text-sm text-zinc-400">
                            ${app.retainage_percent}% ($${retainageAmount})
                        </td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1">
                                <button onclick="editPayApplication(${app.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-edit"></i>
                                </button>
                                <button onclick="deletePayApplication(${app.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function showAddPayAppModal() {
                document.getElementById('modalTitle').innerText = 'New Pay Application';
                document.getElementById('payAppForm').reset();
                document.getElementById('payAppId').value = '';
                document.getElementById('payAppModal').showModal();
            }

            function editPayApplication(id) {
                const app = payApplications.find(a => a.id === id);
                if (!app) return;

                document.getElementById('modalTitle').innerText = 'Edit Pay Application';
                document.getElementById('payAppId').value = app.id;
                document.getElementById('app_number').value = app.app_number;
                document.getElementById('period_ending').value = app.period_ending;
                document.getElementById('contractor').value = app.contractor;
                document.getElementById('current_amount').value = app.current_amount;
                document.getElementById('retainage_percent').value = app.retainage_percent;
                document.getElementById('notes').value = app.notes || '';

                document.getElementById('payAppModal').showModal();
            }

            function savePayApplication(e) {
                e.preventDefault();

                const id = document.getElementById('payAppId').value;

                const newApp = {
                    id: id ? parseInt(id) : Date.now(),
                    app_number: document.getElementById('app_number').value,
                    period_ending: document.getElementById('period_ending').value,
                    contractor: document.getElementById('contractor').value,
                    current_amount: parseFloat(document.getElementById('current_amount').value),
                    retainage_percent: parseFloat(document.getElementById('retainage_percent').value),
                    status: id ? payApplications.find(a => a.id == id).status : 'Draft',
                    notes: document.getElementById('notes').value
                };

                if (id) {
                    const index = payApplications.findIndex(a => a.id == id);
                    payApplications[index] = newApp;
                } else {
                    payApplications.push(newApp);
                }

                renderPayAppTable(payApplications);
                document.getElementById('payAppModal').close();
            }

            function deletePayApplication(id) {
                if (!confirm('Delete this pay application?')) return;
                payApplications = payApplications.filter(a => a.id !== id);
                renderPayAppTable(payApplications);
            }

            function initializePayApplications() {
                renderPayAppTable(payApplications);
            }

            // Initialize on load
            window.onload = function() {
                initializePayApplications();
            };
        </script>

{% endblock %}

</div>
</div>
