<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in • Case PM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #09090b;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }

        .login-shell {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            z-index: 1;
        }

        .login-bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 78%);
            pointer-events: none;
        }

        /* Full viewport-height logo — fixed to screen, scales with browser zoom */
        .login-watermark {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100vh;
            height: 100dvh;
            height: 100svh;
            width: 100vh;
            width: 100dvh;
            width: 100svh;
            pointer-events: none;
            z-index: 0;
            opacity: 0.10;
        }

        .login-watermark-logo {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-watermark-tile {
            width: 100%;
            height: 100%;
            background: #059669;
            border-radius: 18%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 120px rgba(16, 185, 129, 0.12);
            /* em context so the icon scales with the tile, not body text */
            font-size: 100dvh;
        }

        .login-watermark-tile i {
            font-size: 0.58em;
            color: #ffffff;
            line-height: 1;
        }

        .login-card {
            animation: loginIn 0.35s ease-out;
        }

        @keyframes loginIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-input:focus {
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.45);
        }
    </style>
</head>
<body>
    <div class="login-bg-grid" aria-hidden="true"></div>

    <div class="login-watermark" aria-hidden="true">
        <div class="login-watermark-logo">
            <div class="login-watermark-tile">
                <i class="fa-solid fa-hard-hat"></i>
            </div>
        </div>
    </div>

    <div class="login-shell flex items-center justify-center px-4 py-10">
        <div class="relative z-10 w-full max-w-[400px]">
            <div class="flex items-center justify-center gap-2.5 mb-6">
                <div class="w-9 h-9 bg-emerald-600 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-900/30">
                    <i class="fa-solid fa-hard-hat text-white text-base"></i>
                </div>
                <div>
                    <div class="font-display text-2xl tracking-tight text-white leading-none">Case PM</div>
                    <div class="text-[10px] uppercase tracking-[0.18em] text-zinc-500 mt-0.5">Construction OS</div>
                </div>
            </div>

            <div class="login-card bg-zinc-900/55 border border-zinc-800/80 rounded-lg p-6 shadow-2xl shadow-black/40 backdrop-blur-md">
                <div class="mb-5">
                    <h1 class="font-display text-xl text-white">Sign in</h1>
                    <p class="text-zinc-400 text-sm mt-1">Access your projects and field tools</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="mb-4 px-3 py-2.5 rounded-md text-sm flex items-start gap-2.5 border
                                {% if category == 'error' %}bg-red-950/80 border-red-800 text-red-100
                                {% elif category == 'success' %}bg-emerald-950/80 border-emerald-800 text-emerald-100
                                {% elif category == 'warning' %}bg-amber-950/80 border-amber-800 text-amber-100
                                {% else %}bg-zinc-800/80 border-zinc-700 text-zinc-200{% endif %}">
                                <i class="fa-solid mt-0.5
                                    {% if category == 'error' %}fa-circle-xmark
                                    {% elif category == 'success' %}fa-circle-check
                                    {% elif category == 'warning' %}fa-triangle-exclamation
                                    {% else %}fa-circle-info{% endif %}"></i>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}" class="space-y-4" id="loginForm">
                    <div>
                        <label for="email" class="block text-xs font-medium uppercase tracking-wide text-zinc-500 mb-1.5">Email</label>
                        <input id="email" type="email" name="email" required autocomplete="username"
                               class="login-input w-full bg-zinc-950 border border-zinc-700 rounded-md px-3 py-2.5 text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:border-emerald-600 transition-colors"
                               placeholder="you@company.com">
                    </div>

                    <div>
                        <label for="password" class="block text-xs font-medium uppercase tracking-wide text-zinc-500 mb-1.5">Password</label>
                        <input id="password" type="password" name="password" required autocomplete="current-password"
                               class="login-input w-full bg-zinc-950 border border-zinc-700 rounded-md px-3 py-2.5 text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:border-emerald-600 transition-colors"
                               placeholder="Enter password">
                    </div>

                    <div class="flex items-center justify-between gap-3 pt-0.5">
                        <label class="flex items-center gap-2 text-sm text-zinc-400 cursor-pointer select-none">
                            <input type="checkbox" name="remember" class="accent-emerald-500 rounded">
                            <span>Remember me</span>
                        </label>
                    </div>

                    <button type="submit"
                            class="w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 transition-colors text-white font-medium py-2.5 rounded-md text-sm shadow-lg shadow-emerald-900/25">
                        Sign in
                    </button>
                </form>

                <p class="text-center text-[11px] text-zinc-600 mt-5">© 2026 Case PM</p>
            </div>
        </div>
    </div>

</body>
</html>
