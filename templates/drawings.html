{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Drawings</h1>
            <p class="text-zinc-400 mt-1">Project plans, revisions, and markups</p>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="showUploadDrawingModal()" 
                    class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
                <i class="fa-solid fa-upload"></i>
                <span>Upload Drawing</span>
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="drawingSearch" placeholder="Search drawings..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterDrawings()">
        </div>

        <select id="disciplineFilter" onchange="filterDrawings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Disciplines</option>
            <option value="Architectural">Architectural</option>
            <option value="Structural">Structural</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Electrical">Electrical</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Civil">Civil</option>
        </select>

        <select id="statusFilter" onchange="filterDrawings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Current">Current</option>
            <option value="Superseded">Superseded</option>
            <option value="For Review">For Review</option>
        </select>

        <button onclick="clearDrawingFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Drawings Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Drawing #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Title</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Discipline</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Revision</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Date</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="drawingsTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Upload Drawing Modal -->
        <dialog id="uploadDrawingModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-lg shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl">Upload Drawing</div>
                    <button onclick="document.getElementById('uploadDrawingModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="uploadDrawingForm" onsubmit="uploadDrawing(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Drawing Number</label>
                            <input type="text" id="drawing_number" placeholder="e.g. A-101" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Drawing Title</label>
                            <input type="text" id="drawing_title" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Discipline</label>
                                <select id="discipline" required
                                        class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                    <option value="Architectural">Architectural</option>
                                    <option value="Structural">Structural</option>
                                    <option value="Mechanical">Mechanical</option>
                                    <option value="Electrical">Electrical</option>
                                    <option value="Plumbing">Plumbing</option>
                                    <option value="Civil">Civil</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Revision</label>
                                <input type="text" id="revision" value="0" required
                                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">File</label>
                            <input type="file" id="drawing_file" required accept=".pdf,.dwg,.png,.jpg"
                                   class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-2xl file:border-0 file:bg-zinc-700 hover:file:bg-zinc-600">
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('uploadDrawingModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Upload Drawing
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
        <!-- JavaScript -->
        <script>
            // Sample data (will be replaced with backend later)
            let drawings = [
                {
                    id: 1,
                    number: "A-101",
                    title: "Floor Plan - Level 1",
                    discipline: "Architectural",
                    revision: "3",
                    date: "2025-03-12",
                    status: "Current"
                },
                {
                    id: 2,
                    number: "S-201",
                    title: "Foundation Plan",
                    discipline: "Structural",
                    revision: "2",
                    date: "2025-03-08",
                    status: "Current"
                },
                {
                    id: 3,
                    number: "E-301",
                    title: "Lighting Plan - Level 2",
                    discipline: "Electrical",
                    revision: "1",
                    date: "2025-03-15",
                    status: "For Review"
                }
            ];

            function filterDrawings() {
                const searchTerm = document.getElementById('drawingSearch').value.toLowerCase();
                const disciplineFilter = document.getElementById('disciplineFilter').value;
                const statusFilter = document.getElementById('statusFilter').value;

                const filtered = drawings.filter(drawing => {
                    const matchesSearch = drawing.number.toLowerCase().includes(searchTerm) || 
                                        drawing.title.toLowerCase().includes(searchTerm);
                    const matchesDiscipline = !disciplineFilter || drawing.discipline === disciplineFilter;
                    const matchesStatus = !statusFilter || drawing.status === statusFilter;
                    return matchesSearch && matchesDiscipline && matchesStatus;
                });

                renderDrawingsTable(filtered);
            }

            function clearDrawingFilters() {
                document.getElementById('drawingSearch').value = '';
                document.getElementById('disciplineFilter').value = '';
                document.getElementById('statusFilter').value = '';
                renderDrawingsTable(drawings);
            }

            function renderDrawingsTable(drawingList) {
                const tbody = document.getElementById('drawingsTableBody');
                tbody.innerHTML = '';

                if (drawingList.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-zinc-400">
                                No drawings found.
                            </td>
                        </tr>
                    `;
                    return;
                }

                drawingList.forEach(drawing => {
                    const statusColor = 
                        drawing.status === 'Current' ? 'bg-emerald-600/20 text-emerald-400' :
                        drawing.status === 'Superseded' ? 'bg-zinc-600/20 text-zinc-400' :
                        'bg-amber-600/20 text-amber-400';

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-zinc-800/60 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${drawing.number}</td>
                        <td class="px-6 py-4">${drawing.title}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${drawing.discipline}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="font-mono text-sm">Rev ${drawing.revision}</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${drawing.date}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${statusColor}">
                                ${drawing.status}
                            </span>
                        </td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1">
                                <button onclick="viewDrawing(${drawing.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                                <button onclick="editDrawing(${drawing.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-edit"></i>
                                </button>
                                <button onclick="deleteDrawing(${drawing.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function showUploadDrawingModal() {
                document.getElementById('uploadDrawingModal').showModal();
            }

            function uploadDrawing(e) {
                e.preventDefault();

                const newDrawing = {
                    id: Date.now(),
                    number: document.getElementById('drawing_number').value,
                    title: document.getElementById('drawing_title').value,
                    discipline: document.getElementById('discipline').value,
                    revision: document.getElementById('revision').value,
                    date: new Date().toISOString().split('T')[0],
                    status: "For Review"
                };

                drawings.unshift(newDrawing);
                renderDrawingsTable(drawings);
                document.getElementById('uploadDrawingModal').close();
                e.target.reset();
            }

            function viewDrawing(id) {
                const drawing = drawings.find(d => d.id === id);
                if (!drawing) return;
                alert(`Opening drawing: ${drawing.number} - ${drawing.title}\n\n(Drawing viewer with markup tools will be added in a future update.)`);
            }

            function editDrawing(id) {
                const drawing = drawings.find(d => d.id === id);
                if (!drawing) return;

                // Simple edit for now - can be expanded later
                const newRevision = prompt(`Update revision for ${drawing.number}`, drawing.revision);
                if (newRevision !== null) {
                    drawing.revision = newRevision;
                    renderDrawingsTable(drawings);
                }
            }

            function deleteDrawing(id) {
                if (!confirm('Delete this drawing?')) return;
                drawings = drawings.filter(d => d.id !== id);
                renderDrawingsTable(drawings);
            }

            function initializeDrawings() {
                renderDrawingsTable(drawings);
            }

            // Initialize on load
            window.onload = function() {
                initializeDrawings();
            };
        </script>

{% endblock %}

</div>
</div>
