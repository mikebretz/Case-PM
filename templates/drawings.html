{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Drawings</h1>
            <p class="text-zinc-400 mt-1">Project plans, revisions, and markups</p>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="showUploadDrawingModal()" 
                    class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
                <i class="fa-solid fa-upload"></i>
                <span>Upload Drawing</span>
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="drawingSearch" placeholder="Search drawings..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterDrawings()">
        </div>

        <select id="disciplineFilter" onchange="filterDrawings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Disciplines</option>
            <option value="Architectural">Architectural</option>
            <option value="Structural">Structural</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Electrical">Electrical</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Civil">Civil</option>
        </select>

        <select id="statusFilter" onchange="filterDrawings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Current">Current</option>
            <option value="Superseded">Superseded</option>
            <option value="For Review">For Review</option>
        </select>

        <button onclick="clearDrawingFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Drawings Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Drawing #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Title</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Discipline</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Revision</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Date</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="drawingsTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
