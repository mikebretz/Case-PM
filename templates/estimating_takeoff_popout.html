<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case PM — Takeoff</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="{{ url_for('static', filename='js/casepm-dialog.js') }}"></script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #09090b; }
    #estTakeoffPopoutRoot { height: 100vh; width: 100vw; }
    .ett-wrap { height: 100% !important; border: 0 !important; border-radius: 0 !important; }
  </style>
</head>
<body class="text-white">
  <script>
  window.CASEPM_ESTIMATE_TAKEOFF_CTX = {
    projectId: {{ project_id or 'null' }},
    estimateId: {{ estimate_id or 'null' }},
    drawingId: {{ drawing_id or 'null' }},
    popout: true,
  };
  </script>
  <div id="estTakeoffPopoutRoot"></div>
  <script src="{{ url_for('static', filename='js/estimate-takeoff-viewer.js') }}"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const ctx = window.CASEPM_ESTIMATE_TAKEOFF_CTX || {};
    if (!ctx.estimateId) {
      document.getElementById('estTakeoffPopoutRoot').innerHTML = '<p class="text-zinc-500 p-6">Open from Estimating → Takeoff → Pop Out.</p>';
      return;
    }
    window.CasePMEstimateTakeoff.init('#estTakeoffPopoutRoot', {
      projectId: ctx.projectId,
      estimateId: ctx.estimateId,
      drawingId: ctx.drawingId,
      popout: true,
    });
  });
  </script>
</body>
</html>
