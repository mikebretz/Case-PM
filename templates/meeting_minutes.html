{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Meeting Minutes</h1>
            <p class="text-zinc-400 mt-1">Record and track project meetings</p>
        </div>
        
        <button onclick="showAddMeetingModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>New Meeting Minutes</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="meetingSearch" placeholder="Search meetings..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterMeetings()">
        </div>

        <select id="typeFilter" onchange="filterMeetings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Types</option>
            <option value="Owner-Architect">Owner-Architect</option>
            <option value="Subcontractor">Subcontractor</option>
            <option value="Internal">Internal</option>
            <option value="Safety">Safety</option>
            <option value="Other">Other</option>
        </select>

        <select id="projectFilter" onchange="filterMeetings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Projects</option>
        </select>

        <button onclick="clearMeetingFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Meeting Minutes Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Meeting #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Date</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Type</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Subject</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Location</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Action Items</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="meetingsTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Add / Edit Meeting Modal -->
        <dialog id="meetingModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-2xl shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">New Meeting Minutes</div>
                    <button onclick="document.getElementById('meetingModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="meetingForm" onsubmit="saveMeeting(event)">
                    <input type="hidden" id="meetingId">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Meeting Number</label>
                            <input type="text" id="meeting_number" placeholder="e.g. MM-024" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Date</label>
                            <input type="date" id="meeting_date" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Meeting Type</label>
                            <select id="meeting_type" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="Owner-Architect">Owner-Architect</option>
                                <option value="Subcontractor">Subcontractor</option>
                                <option value="Internal">Internal</option>
                                <option value="Safety">Safety</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Location</label>
                            <input type="text" id="location" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Subject / Purpose</label>
                        <input type="text" id="subject" required
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Attendees</label>
                        <textarea id="attendees" rows="2" placeholder="List attendees separated by commas"
                                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Notes / Discussion Points</label>
                        <textarea id="notes" rows="4"
                                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('meetingModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Meeting Minutes
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
