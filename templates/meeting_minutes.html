{% extends "base.html" %}

{% block content %}
<style>
  #mainContent:has(.mm-page) { overflow: hidden !important; display: flex; flex-direction: column; padding: 0 !important; }
  .mm-page { display: flex; flex-direction: column; flex: 1; min-height: 0; width: 100%; padding: 1rem 1rem 0; overflow: hidden; box-sizing: border-box; }
  .mm-stack { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
</style>
<div class="mm-page"><div class="mm-stack">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-4 flex-shrink-0">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight">Meeting Minutes</h1>
            <p class="text-zinc-400 text-sm mt-0.5">Record and track project meetings</p>
        </div>
        
        <button onclick="showAddMeetingModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-md text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>New Meeting Minutes</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-3 bg-zinc-900 border border-zinc-700 rounded-md p-3 flex-shrink-0">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="meetingSearch" placeholder="Search meetings..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-md px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterMeetings()">
        </div>

        <select id="typeFilter" onchange="filterMeetings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-md px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Types</option>
            <option value="Owner-Architect">Owner-Architect</option>
            <option value="Subcontractor">Subcontractor</option>
            <option value="Internal">Internal</option>
            <option value="Safety">Safety</option>
            <option value="Other">Other</option>
        </select>

        <select id="projectFilter" onchange="filterMeetings()" 
                class="bg-zinc-800 border border-zinc-700 rounded-md px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Projects</option>
        </select>

        <button onclick="clearMeetingFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-md transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Meeting Minutes Table (scrolls) -->
    <div class="flex-1 min-h-0 overflow-auto border border-zinc-700 rounded-md bg-zinc-900 mb-2">
        <table class="w-full">
            <thead class="sticky top-0 z-10 bg-zinc-950">
                <tr class="border-b border-zinc-800">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Meeting #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Date</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Type</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Subject</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Location</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Action Items</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="meetingsTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div></div>
        <!-- Add / Edit Meeting Modal -->
        <dialog id="meetingModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-2xl shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">New Meeting Minutes</div>
                    <button onclick="document.getElementById('meetingModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="meetingForm" onsubmit="saveMeeting(event)">
                    <input type="hidden" id="meetingId">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Meeting Number</label>
                            <input type="text" id="meeting_number" placeholder="e.g. MM-024" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Date</label>
                            <input type="date" id="meeting_date" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Meeting Type</label>
                            <select id="meeting_type" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="Owner-Architect">Owner-Architect</option>
                                <option value="Subcontractor">Subcontractor</option>
                                <option value="Internal">Internal</option>
                                <option value="Safety">Safety</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Location</label>
                            <input type="text" id="location" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Subject / Purpose</label>
                        <input type="text" id="subject" required
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Attendees</label>
                        <textarea id="attendees" rows="2" placeholder="List attendees separated by commas"
                                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm text-zinc-400 mb-1.5">Notes / Discussion Points</label>
                        <textarea id="notes" rows="4"
                                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('meetingModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Meeting Minutes
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
        <!-- JavaScript -->
        <script>
            // Sample data (will be replaced with backend later)
            let meetings = [
                {
                    id: 1,
                    meeting_number: "MM-023",
                    date: "2025-04-01",
                    type: "Owner-Architect",
                    subject: "Weekly Progress Review",
                    location: "Job Site Trailer",
                    attendees: "Mike B., John A., Sarah K.",
                    status: "Completed",
                    action_items: 4
                },
                {
                    id: 2,
                    meeting_number: "MM-024",
                    date: "2025-04-08",
                    type: "Subcontractor",
                    subject: "Electrical & Plumbing Coordination",
                    location: "Conference Room",
                    attendees: "Mike B., PowerTech, ABC Plumbing",
                    status: "Scheduled",
                    action_items: 0
                }
            ];

            function filterMeetings() {
                const searchTerm = document.getElementById('meetingSearch').value.toLowerCase();
                const typeFilter = document.getElementById('typeFilter').value;

                const filtered = meetings.filter(meeting => {
                    const matchesSearch = meeting.subject.toLowerCase().includes(searchTerm) || 
                                        meeting.meeting_number.toLowerCase().includes(searchTerm);
                    const matchesType = !typeFilter || meeting.type === typeFilter;
                    return matchesSearch && matchesType;
                });

                renderMeetingsTable(filtered);
            }

            function clearMeetingFilters() {
                document.getElementById('meetingSearch').value = '';
                document.getElementById('typeFilter').value = '';
                document.getElementById('projectFilter').value = '';
                renderMeetingsTable(meetings);
            }

            function renderMeetingsTable(meetingList) {
                const tbody = document.getElementById('meetingsTableBody');
                tbody.innerHTML = '';

                if (meetingList.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-zinc-400">
                                No meetings found.
                            </td>
                        </tr>
                    `;
                    return;
                }

                meetingList.forEach(meeting => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-zinc-800/60 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${meeting.meeting_number}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${meeting.date}</td>
                        <td class="px-6 py-4">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium bg-zinc-700 text-zinc-300">
                                ${meeting.type}
                            </span>
                        </td>
                        <td class="px-6 py-4">${meeting.subject}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${meeting.location}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium bg-blue-600/20 text-blue-400">
                                ${meeting.action_items} items
                            </span>
                        </td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1">
                                <button onclick="editMeeting(${meeting.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-edit"></i>
                                </button>
                                <button onclick="deleteMeeting(${meeting.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function showAddMeetingModal() {
                document.getElementById('modalTitle').innerText = 'New Meeting Minutes';
                document.getElementById('meetingForm').reset();
                document.getElementById('meetingId').value = '';
                document.getElementById('meetingModal').showModal();
            }

            function editMeeting(id) {
                const meeting = meetings.find(m => m.id === id);
                if (!meeting) return;

                document.getElementById('modalTitle').innerText = 'Edit Meeting Minutes';
                document.getElementById('meetingId').value = meeting.id;
                document.getElementById('meeting_number').value = meeting.meeting_number;
                document.getElementById('meeting_date').value = meeting.date;
                document.getElementById('meeting_type').value = meeting.type;
                document.getElementById('subject').value = meeting.subject;
                document.getElementById('location').value = meeting.location;
                document.getElementById('attendees').value = meeting.attendees || '';
                document.getElementById('notes').value = meeting.notes || '';

                document.getElementById('meetingModal').showModal();
            }

            function saveMeeting(e) {
                e.preventDefault();

                const id = document.getElementById('meetingId').value;

                const newMeeting = {
                    id: id ? parseInt(id) : Date.now(),
                    meeting_number: document.getElementById('meeting_number').value,
                    date: document.getElementById('meeting_date').value,
                    type: document.getElementById('meeting_type').value,
                    subject: document.getElementById('subject').value,
                    location: document.getElementById('location').value,
                    attendees: document.getElementById('attendees').value,
                    notes: document.getElementById('notes').value,
                    status: id ? meetings.find(m => m.id == id).status : 'Completed',
                    action_items: id ? meetings.find(m => m.id == id).action_items : 0
                };

                if (id) {
                    const index = meetings.findIndex(m => m.id == id);
                    meetings[index] = newMeeting;
                } else {
                    meetings.push(newMeeting);
                }

                renderMeetingsTable(meetings);
                document.getElementById('meetingModal').close();
            }

            function deleteMeeting(id) {
                if (!confirm('Delete these meeting minutes?')) return;
                meetings = meetings.filter(m => m.id !== id);
                renderMeetingsTable(meetings);
            }

            function initializeMeetings() {
                renderMeetingsTable(meetings);
            }

            // Initialize on load
            window.onload = function() {
                initializeMeetings();
            };
        </script>

{% endblock %}

</div>
</div>
