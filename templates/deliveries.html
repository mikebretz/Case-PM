{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Deliveries</h1>
            <p class="text-zinc-400 mt-1">Track material and equipment deliveries</p>
        </div>
        
        <button onclick="showAddDeliveryModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>Log Delivery</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="deliverySearch" placeholder="Search deliveries..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterDeliveries()">
        </div>

        <select id="statusFilter" onchange="filterDeliveries()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Pending">Pending</option>
            <option value="Received">Received</option>
            <option value="Partial">Partial</option>
            <option value="Delayed">Delayed</option>
        </select>

        <select id="supplierFilter" onchange="filterDeliveries()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Suppliers</option>
        </select>

        <button onclick="clearDeliveryFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Deliveries Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Delivery #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Date</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Supplier</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Description</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Received By</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="deliveriesTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Add / Edit Delivery Modal -->
        <dialog id="deliveryModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-lg shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">Log New Delivery</div>
                    <button onclick="document.getElementById('deliveryModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="deliveryForm" onsubmit="saveDelivery(event)">
                    <input type="hidden" id="deliveryId">

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Supplier / Vendor</label>
                            <input type="text" id="supplier" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Description</label>
                            <textarea id="description" rows="2" required
                                      class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Delivery Date</label>
                                <input type="date" id="delivery_date" required
                                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                            </div>
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Status</label>
                                <select id="status" required
                                        class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                    <option value="Pending">Pending</option>
                                    <option value="Received">Received</option>
                                    <option value="Partial">Partial</option>
                                    <option value="Delayed">Delayed</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Received By</label>
                            <input type="text" id="received_by"
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('deliveryModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Delivery
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
        <!-- JavaScript -->
        <script>
            // Sample data (will be replaced with backend later)
            let deliveries = [
                {
                    id: 1,
                    delivery_number: "DEL-008",
                    date: "2025-04-02",
                    supplier: "ABC Concrete LLC",
                    description: "4000 PSI Concrete - 12 yards",
                    status: "Received",
                    received_by: "Mike B."
                },
                {
                    id: 2,
                    delivery_number: "DEL-009",
                    date: "2025-04-05",
                    supplier: "Steel Dynamics LLC",
                    description: "Rebar #4 & #5 - Various lengths",
                    status: "Pending",
                    received_by: ""
                },
                {
                    id: 3,
                    delivery_number: "DEL-010",
                    date: "2025-04-03",
                    supplier: "PowerTech Electric",
                    description: "Conduit and wire - 2nd floor",
                    status: "Partial",
                    received_by: "John D."
                }
            ];

            function filterDeliveries() {
                const searchTerm = document.getElementById('deliverySearch').value.toLowerCase();
                const statusFilter = document.getElementById('statusFilter').value;

                const filtered = deliveries.filter(delivery => {
                    const matchesSearch = delivery.supplier.toLowerCase().includes(searchTerm) || 
                                        delivery.description.toLowerCase().includes(searchTerm);
                    const matchesStatus = !statusFilter || delivery.status === statusFilter;
                    return matchesSearch && matchesStatus;
                });

                renderDeliveriesTable(filtered);
            }

            function clearDeliveryFilters() {
                document.getElementById('deliverySearch').value = '';
                document.getElementById('statusFilter').value = '';
                document.getElementById('supplierFilter').value = '';
                renderDeliveriesTable(deliveries);
            }

            function renderDeliveriesTable(deliveryList) {
                const tbody = document.getElementById('deliveriesTableBody');
                tbody.innerHTML = '';

                if (deliveryList.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-zinc-400">
                                No deliveries found.
                            </td>
                        </tr>
                    `;
                    return;
                }

                deliveryList.forEach(delivery => {
                    const statusColor = 
                        delivery.status === 'Received' ? 'bg-emerald-600/20 text-emerald-400' :
                        delivery.status === 'Partial' ? 'bg-amber-600/20 text-amber-400' :
                        delivery.status === 'Delayed' ? 'bg-red-600/20 text-red-400' :
                        'bg-zinc-600/20 text-zinc-400';

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-zinc-800/60 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${delivery.delivery_number}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${delivery.date}</td>
                        <td class="px-6 py-4">${delivery.supplier}</td>
                        <td class="px-6 py-4">${delivery.description}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${statusColor}">
                                ${delivery.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center text-sm text-zinc-400">${delivery.received_by || '-'}</td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1">
                                <button onclick="editDelivery(${delivery.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-edit"></i>
                                </button>
                                <button onclick="deleteDelivery(${delivery.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function showAddDeliveryModal() {
                document.getElementById('modalTitle').innerText = 'Log New Delivery';
                document.getElementById('deliveryForm').reset();
                document.getElementById('deliveryId').value = '';
                document.getElementById('deliveryModal').showModal();
            }

            function editDelivery(id) {
                const delivery = deliveries.find(d => d.id === id);
                if (!delivery) return;

                document.getElementById('modalTitle').innerText = 'Edit Delivery';
                document.getElementById('deliveryId').value = delivery.id;
                document.getElementById('supplier').value = delivery.supplier;
                document.getElementById('description').value = delivery.description;
                document.getElementById('delivery_date').value = delivery.date;
                document.getElementById('status').value = delivery.status;
                document.getElementById('received_by').value = delivery.received_by || '';

                document.getElementById('deliveryModal').showModal();
            }

            function saveDelivery(e) {
                e.preventDefault();

                const id = document.getElementById('deliveryId').value;

                const newDelivery = {
                    id: id ? parseInt(id) : Date.now(),
                    delivery_number: id ? deliveries.find(d => d.id == id).delivery_number : `DEL-${String(deliveries.length + 1).padStart(3, '0')}`,
                    date: document.getElementById('delivery_date').value,
                    supplier: document.getElementById('supplier').value,
                    description: document.getElementById('description').value,
                    status: document.getElementById('status').value,
                    received_by: document.getElementById('received_by').value
                };

                if (id) {
                    const index = deliveries.findIndex(d => d.id == id);
                    deliveries[index] = newDelivery;
                } else {
                    deliveries.push(newDelivery);
                }

                renderDeliveriesTable(deliveries);
                document.getElementById('deliveryModal').close();
            }

            function deleteDelivery(id) {
                if (!confirm('Delete this delivery record?')) return;
                deliveries = deliveries.filter(d => d.id !== id);
                renderDeliveriesTable(deliveries);
            }

            function initializeDeliveries() {
                renderDeliveriesTable(deliveries);
            }

            // Initialize on load
            window.onload = function() {
                initializeDeliveries();
            };
        </script>

{% endblock %}

</div>
</div>
