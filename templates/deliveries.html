{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Deliveries</h1>
            <p class="text-zinc-400 mt-1">Track material and equipment deliveries</p>
        </div>
        
        <button onclick="showAddDeliveryModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>Log Delivery</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="deliverySearch" placeholder="Search deliveries..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterDeliveries()">
        </div>

        <select id="statusFilter" onchange="filterDeliveries()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Pending">Pending</option>
            <option value="Received">Received</option>
            <option value="Partial">Partial</option>
            <option value="Delayed">Delayed</option>
        </select>

        <select id="supplierFilter" onchange="filterDeliveries()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Suppliers</option>
        </select>

        <button onclick="clearDeliveryFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Deliveries Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Delivery #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Date</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Supplier</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Description</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Received By</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="deliveriesTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Add / Edit Delivery Modal -->
        <dialog id="deliveryModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-lg shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">Log New Delivery</div>
                    <button onclick="document.getElementById('deliveryModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="deliveryForm" onsubmit="saveDelivery(event)">
                    <input type="hidden" id="deliveryId">

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Supplier / Vendor</label>
                            <input type="text" id="supplier" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Description</label>
                            <textarea id="description" rows="2" required
                                      class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Delivery Date</label>
                                <input type="date" id="delivery_date" required
                                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                            </div>
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Status</label>
                                <select id="status" required
                                        class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                    <option value="Pending">Pending</option>
                                    <option value="Received">Received</option>
                                    <option value="Partial">Partial</option>
                                    <option value="Delayed">Delayed</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Received By</label>
                            <input type="text" id="received_by"
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('deliveryModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Delivery
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
