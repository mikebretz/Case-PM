{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Punch List</h1>
            <p class="text-zinc-400 mt-1">Track and manage outstanding items</p>
        </div>
        
        <button onclick="showAddPunchModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>Add Punch Item</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="punchSearch" placeholder="Search punch items..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterPunchList()">
        </div>

        <select id="statusFilter" onchange="filterPunchList()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Rejected">Rejected</option>
        </select>

        <select id="locationFilter" onchange="filterPunchList()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Locations</option>
        </select>

        <button onclick="clearPunchFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Punch List Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400 w-16">#</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Description</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Location</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Assigned To</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Due Date</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Photo</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="punchTableBody" class="divide-y divide-zinc-800">
                <!-- Rows will be populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
