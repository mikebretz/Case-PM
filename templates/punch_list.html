{% extends "base.html" %}

{% block content %}
<script>
window.CASEPM_PUNCH_CTX = {
  projectId: {{ active_project.id if active_project else 'null' }},
  projectName: {{ (active_project.name if active_project else '')|tojson }},
  projects: [
    {% for p in projects %}{ id: {{ p.id }}, name: {{ p.name|tojson }} }{% if not loop.last %},{% endif %}{% endfor %}
  ],
};
</script>
<script src="{{ url_for('static', filename='js/punch-list-app.js') }}"></script>

<style>
.punch-page { display: flex; flex-direction: column; flex: 1; min-height: 0; width: 100%; padding: 1rem 1rem 0; box-sizing: border-box; }
  .punch-stack { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
  .punch-input { width: 100%; background: #27272a; border: 1px solid #3f3f46; border-radius: 0.5rem; padding: 0.5rem 0.65rem; font-size: 0.875rem; color: #fff; }
  .punch-input:focus { outline: none; border-color: #10b981; }
  .punch-chip { padding: 0.15rem 0.55rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; white-space: nowrap; }

  /* Fast check-off row */
  .punch-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border-bottom: 1px solid #27272a; cursor: pointer; }
  .punch-row:hover { background: #202023; }
  .punch-row.done .punch-desc { text-decoration: line-through; color: #71717a; }
  .punch-check { width: 30px; height: 30px; border-radius: 9999px; border: 2px solid #52525b; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; background: transparent; }
  .punch-check:hover { border-color: #10b981; }
  .punch-check.checked { background: #059669; border-color: #059669; }
  .punch-check i { color: #fff; font-size: 0.8rem; opacity: 0; }
  .punch-check.checked i { opacity: 1; }
  .punch-pri { width: 6px; align-self: stretch; border-radius: 3px; flex-shrink: 0; }
  .punch-pri.High { background: #ef4444; } .punch-pri.Medium { background: #f59e0b; } .punch-pri.Low { background: #22c55e; }
  .punch-meta { font-size: 0.72rem; color: #a1a1aa; display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 2px; }
  .punch-overdue { color: #f87171 !important; font-weight: 600; }

  /* Board view */
  .punch-board { display: grid; grid-template-columns: repeat(4, minmax(220px, 1fr)); gap: 0.75rem; height: 100%; }
  .punch-col { background: #18181b; border: 1px solid #3f3f46; border-radius: 0.5rem; display: flex; flex-direction: column; min-height: 0; }
  .punch-col-head { padding: 0.6rem 0.75rem; border-bottom: 1px solid #3f3f46; font-size: 0.8rem; font-weight: 600; position: sticky; top: 0; }
  .punch-col-body { padding: 0.5rem; overflow-y: auto; flex: 1; min-height: 0; }
  .punch-card { background: #27272a; border: 1px solid #3f3f46; border-radius: 0.5rem; padding: 0.6rem; margin-bottom: 0.5rem; cursor: pointer; }
  .punch-card:hover { border-color: #52525b; }
  @media (max-width: 1024px) { .punch-board { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .punch-board { grid-template-columns: 1fr; } .punch-hide-mobile { display: none !important; } }
</style>

<div class="punch-page">
<div class="punch-stack">

<!-- TOOLBAR -->
<div class="flex items-center justify-between flex-shrink-0 mb-4 gap-3">
  <div class="flex items-center gap-3 min-w-0">
    <div class="text-2xl font-semibold text-white whitespace-nowrap">Punch List</div>
    <div id="punchProjectBadge" class="text-xs px-3 py-1 bg-zinc-800 border border-zinc-700 text-zinc-400 rounded-md font-mono truncate max-w-[220px] punch-hide-mobile">—</div>
    <div class="text-xs text-zinc-500 hidden lg:block">Tap the circle to check off · Photos · Assignees</div>
  </div>
  <div class="flex items-center gap-2 flex-wrap justify-end">
    <div class="flex items-center rounded-md overflow-hidden border border-zinc-700 punch-hide-mobile">
      <button type="button" id="punchViewList" class="px-3 py-2 text-sm bg-zinc-700"><i class="fa-solid fa-list"></i></button>
      <button type="button" id="punchViewBoard" class="px-3 py-2 text-sm bg-zinc-800"><i class="fa-solid fa-table-columns"></i></button>
    </div>
    <button type="button" id="punchBtnRefresh" class="flex items-center gap-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-md text-sm font-medium h-[38px] punch-hide-mobile">
      <i class="fa-solid fa-rotate"></i><span class="hidden md:inline">Refresh</span>
    </button>
    <button type="button" id="punchBtnNew" class="flex items-center gap-2 px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-md text-sm font-semibold h-[38px]">
      <i class="fa-solid fa-plus"></i><span>New Item</span>
    </button>
  </div>
</div>

<!-- QUICK ADD (fast field entry) -->
<div class="flex gap-2 mb-3 flex-shrink-0">
  <input type="text" id="punchQuickAdd" class="punch-input" placeholder="Quick add: type a deficiency and press Enter (e.g. 'Touch up paint — Room 204')" style="flex:1 1 auto;">
  <button type="button" id="punchQuickAddBtn" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-md text-sm font-medium whitespace-nowrap"><i class="fa-solid fa-bolt text-amber-400"></i> Add</button>
</div>

<!-- SUMMARY CARDS -->
<div class="bg-zinc-900 border border-zinc-700 rounded-md p-4 flex-shrink-0 mb-4">
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
    <div class="bg-zinc-800 border border-zinc-700 rounded-md p-4"><div class="text-xs text-zinc-400">Open</div><div id="pstatOpen" class="text-2xl font-semibold mt-1 text-amber-400">0</div></div>
    <div class="bg-zinc-800 border border-zinc-700 rounded-md p-4"><div class="text-xs text-zinc-400">In Progress</div><div id="pstatProgress" class="text-2xl font-semibold mt-1 text-sky-400">0</div></div>
    <div class="bg-zinc-800 border border-zinc-700 rounded-md p-4"><div class="text-xs text-zinc-400">Ready for Review</div><div id="pstatReady" class="text-2xl font-semibold mt-1 text-violet-400">0</div></div>
    <div class="bg-zinc-800 border border-zinc-700 rounded-md p-4"><div class="text-xs text-zinc-400">Closed</div><div id="pstatClosed" class="text-2xl font-semibold mt-1 text-emerald-400">0</div></div>
    <div class="bg-zinc-800 border border-zinc-700 rounded-md p-4"><div class="text-xs text-zinc-400">Overdue</div><div id="pstatOverdue" class="text-2xl font-semibold mt-1 text-red-400">0</div></div>
    <div class="bg-zinc-800 border border-zinc-700 rounded-md p-4"><div class="text-xs text-zinc-400">% Complete</div><div id="pstatPct" class="text-2xl font-semibold mt-1">0%</div></div>
  </div>
</div>

<!-- FILTERS -->
<div class="flex flex-wrap items-center gap-2 mb-3 flex-shrink-0">
  <input type="text" id="punchSearch" placeholder="Search description, location, assignee…" class="punch-input" style="flex:1 1 260px; min-width:180px; width:auto;">
  <select id="punchStatusFilter" class="punch-input" style="flex:0 0 auto; width:150px;"><option value="">All Statuses</option></select>
  <select id="punchPriorityFilter" class="punch-input" style="flex:0 0 auto; width:130px;"><option value="">Any Priority</option></select>
  <select id="punchGroupBy" class="punch-input" style="flex:0 0 auto; width:150px;">
    <option value="">No grouping</option>
    <option value="status">Group: Status</option>
    <option value="trade">Group: Trade</option>
    <option value="location">Group: Location</option>
    <option value="assigned_to">Group: Assignee</option>
  </select>
  <label class="flex items-center gap-1.5 text-xs text-zinc-400 cursor-pointer whitespace-nowrap">
    <input type="checkbox" id="punchHideClosed" class="accent-emerald-500"> Hide closed
  </label>
</div>

<!-- LIST / BOARD -->
<div class="flex-1 min-h-0 overflow-auto border border-zinc-700 rounded-md bg-zinc-900 mb-16">
  <div id="punchListHost"></div>
  <div id="punchBoardHost" class="hidden p-2"></div>
</div>

<!-- STATUS BAR -->
<div class="flex-shrink-0 border-t border-zinc-700 bg-zinc-900 px-4 py-2 text-xs text-zinc-500 flex items-center justify-between">
  <span id="punchStatusText">—</span>
  <span id="punchUpdatedAt">—</span>
</div>

</div>
</div>

<!-- ==================== CREATE / EDIT MODAL ==================== -->
<dialog id="punchModal" class="modal casepm-dialog bg-zinc-900 border border-zinc-700 rounded-lg w-full max-w-3xl p-0">
  <div class="px-5 py-4 border-b border-zinc-700 flex items-center justify-between flex-shrink-0">
    <h3 id="punchModalTitle" class="font-semibold text-lg">New Punch Item</h3>
    <button type="button" id="punchModalClose" class="text-zinc-400 hover:text-white text-xl leading-none px-1">&times;</button>
  </div>

  <div class="p-5 overflow-y-auto space-y-4" style="max-height: 76vh;">
    <div>
      <label class="block text-xs text-zinc-400 mb-1">Description</label>
      <textarea id="punchDesc" rows="2" class="punch-input resize-y" placeholder="What needs to be fixed?"></textarea>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
      <div><label class="block text-xs text-zinc-400 mb-1">Location / Room</label><input id="punchLocation" class="punch-input" placeholder="e.g. Room 204"></div>
      <div><label class="block text-xs text-zinc-400 mb-1">Category</label><select id="punchCategory" class="punch-input"></select></div>
      <div><label class="block text-xs text-zinc-400 mb-1">Trade</label><input id="punchTrade" class="punch-input" placeholder="e.g. Electrical"></div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
      <div><label class="block text-xs text-zinc-400 mb-1">Priority</label><select id="punchPriority" class="punch-input"></select></div>
      <div><label class="block text-xs text-zinc-400 mb-1">Status</label><select id="punchStatus" class="punch-input"></select></div>
      <div><label class="block text-xs text-zinc-400 mb-1">Assignee</label><input id="punchAssignee" class="punch-input" placeholder="Person responsible"></div>
      <div><label class="block text-xs text-zinc-400 mb-1">Due Date</label><input type="date" id="punchDue" class="punch-input"></div>
    </div>
    <div>
      <label class="block text-xs text-zinc-400 mb-1">Company / Sub</label>
      <input id="punchCompany" class="punch-input" list="punchCompanyList" placeholder="Responsible company">
    </div>

    <!-- Photos -->
    <div class="border border-zinc-700 rounded-lg p-3">
      <div class="flex items-center justify-between mb-2">
        <span class="font-medium text-sm"><i class="fa-solid fa-camera text-sky-400 mr-2"></i>Photos <span id="punchPhotoCount" class="text-xs text-zinc-500"></span></span>
        <div class="flex gap-2">
          <button type="button" id="punchOpenCamera" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-md text-xs font-semibold"><i class="fa-solid fa-camera"></i> Camera</button>
          <button type="button" id="punchBrowseBtn" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-md text-xs"><i class="fa-solid fa-folder-open"></i> Browse</button>
        </div>
      </div>
      <input type="file" id="punchBrowseInput" accept="image/*" multiple class="hidden">
      <div id="punchPhotoGrid" class="grid grid-cols-3 md:grid-cols-5 gap-2"></div>
    </div>

    <!-- Subtasks -->
    <div class="border border-zinc-700 rounded-lg p-3">
      <div class="flex items-center justify-between mb-2">
        <span class="font-medium text-sm"><i class="fa-solid fa-list-check text-emerald-400 mr-2"></i>Checklist</span>
        <button type="button" id="punchAddSubtask" class="text-xs text-emerald-400"><i class="fa-solid fa-plus mr-1"></i>Add step</button>
      </div>
      <div id="punchSubtasks" class="space-y-1.5"></div>
    </div>
  </div>

  <div class="px-5 py-3 border-t border-zinc-700 flex items-center justify-between flex-shrink-0">
    <button type="button" id="punchDelete" class="px-3 py-2 text-sm text-red-400 hover:text-red-300 hidden"><i class="fa-solid fa-trash mr-1"></i>Delete</button>
    <div class="flex gap-2 ml-auto">
      <button type="button" id="punchCancel" class="px-4 py-2 text-sm rounded-md border border-zinc-700 hover:bg-zinc-800">Cancel</button>
      <button type="button" id="punchSave" class="px-6 py-2 text-sm bg-emerald-600 hover:bg-emerald-500 rounded-md font-semibold">Save Item</button>
    </div>
  </div>
</dialog>

<!-- ==================== CAMERA MODAL ==================== -->
<dialog id="punchCameraModal" class="modal casepm-dialog bg-zinc-900 border border-zinc-700 rounded-lg p-0" style="max-width:560px;">
  <div class="px-4 py-3 border-b border-zinc-700 flex items-center justify-between">
    <h3 class="font-semibold">Camera</h3>
    <div class="flex items-center gap-2">
      <button type="button" id="punchCamSwitch" class="text-xs px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-md"><i class="fa-solid fa-camera-rotate mr-1"></i>Flip</button>
      <button type="button" id="punchCamClose" class="text-zinc-400 hover:text-white text-xl leading-none px-1">&times;</button>
    </div>
  </div>
  <div class="p-4">
    <video id="punchVideo" autoplay playsinline muted style="width:100%;border-radius:0.5rem;background:#000;max-height:60vh;object-fit:contain;"></video>
    <canvas id="punchSnapCanvas" class="hidden"></canvas>
    <div id="punchCamError" class="hidden text-sm text-red-400 py-6 text-center"></div>
    <div class="flex gap-3 mt-3">
      <button type="button" id="punchCamShoot" class="flex-1 flex items-center justify-center gap-2 p-3 bg-emerald-600 hover:bg-emerald-500 rounded-lg font-semibold"><i class="fa-solid fa-circle"></i> Capture</button>
    </div>
    <div id="punchCamThumbs" class="grid grid-cols-4 gap-2 mt-3"></div>
  </div>
  <div class="px-4 py-3 border-t border-zinc-700 flex justify-end">
    <button type="button" id="punchCamDone" class="px-5 py-2 text-sm bg-emerald-600 hover:bg-emerald-500 rounded-md font-semibold">Done</button>
  </div>
</dialog>

<!-- ==================== DETAIL MODAL ==================== -->
<dialog id="punchDetailModal" class="modal casepm-dialog bg-zinc-900 border border-zinc-700 rounded-lg w-full max-w-2xl p-0">
  <div class="px-5 py-4 border-b border-zinc-700 flex items-center justify-between">
    <h3 id="punchDetailTitle" class="font-semibold text-lg">Punch Item</h3>
    <button type="button" id="punchDetailClose" class="text-zinc-400 hover:text-white text-xl leading-none px-1">&times;</button>
  </div>
  <div id="punchDetailBody" class="p-5 overflow-y-auto space-y-4 text-sm" style="max-height: 70vh;"></div>
  <div class="px-5 py-3 border-t border-zinc-700 flex items-center gap-2">
    <input type="text" id="punchCommentInput" class="punch-input" placeholder="Add a comment…" style="flex:1 1 auto;">
    <button type="button" id="punchCommentBtn" class="px-4 py-2 text-sm bg-zinc-800 hover:bg-zinc-700 rounded-md">Comment</button>
    <button type="button" id="punchDetailEdit" class="px-4 py-2 text-sm bg-emerald-600 hover:bg-emerald-500 rounded-md font-semibold"><i class="fa-solid fa-pen mr-1"></i>Edit</button>
  </div>
</dialog>

<datalist id="punchCompanyList"></datalist>

{% endblock %}
