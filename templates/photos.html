{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Photos</h1>
            <p class="text-zinc-400 mt-1">Project photos and documentation</p>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="showUploadModal()" 
                    class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
                <i class="fa-solid fa-upload"></i>
                <span>Upload Photos</span>
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="photoSearch" placeholder="Search photos..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterPhotos()">
        </div>

        <select id="locationFilter" onchange="filterPhotos()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Locations</option>
        </select>

        <select id="dateFilter" onchange="filterPhotos()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Dates</option>
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="month">This Month</option>
        </select>

        <button onclick="clearPhotoFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Photos Grid -->
    <div id="photosGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
        <!-- Photos will be populated here via JavaScript -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-12">
        <i class="fa-solid fa-images text-6xl text-zinc-700 mb-4"></i>
        <h3 class="text-xl font-semibold mb-2">No photos found</h3>
        <p class="text-zinc-400">Upload photos or adjust your filters.</p>
    </div>

</div>
        <!-- Upload Photos Modal -->
        <dialog id="uploadModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-lg shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl">Upload Photos</div>
                    <button onclick="document.getElementById('uploadModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <div class="border-2 border-dashed border-zinc-700 rounded-3xl p-8 text-center mb-4 hover:border-emerald-600 transition-colors" id="dropZone">
                    <i class="fa-solid fa-cloud-upload-alt text-4xl text-zinc-500 mb-3"></i>
                    <p class="text-zinc-300">Drag and drop photos here</p>
                    <p class="text-xs text-zinc-500 mt-1">or</p>
                    <button type="button" onclick="document.getElementById('fileInput').click()" 
                            class="mt-3 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
                        Browse Files
                    </button>
                    <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                </div>

                <div id="selectedFiles" class="max-h-40 overflow-auto mb-4 hidden"></div>

                <div class="flex gap-3">
                    <button onclick="document.getElementById('uploadModal').close()" 
                            class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                        Cancel
                    </button>
                    <button onclick="uploadPhotos()" 
                            class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                        Upload
                    </button>
                </div>
            </div>
        </dialog>
