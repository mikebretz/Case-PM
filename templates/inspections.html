{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Inspections</h1>
            <p class="text-zinc-400 mt-1">Track scheduled and completed inspections</p>
        </div>
        
        <button onclick="showAddInspectionModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span>Schedule Inspection</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="inspectionSearch" placeholder="Search inspections..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterInspections()">
        </div>

        <select id="typeFilter" onchange="filterInspections()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Types</option>
            <option value="Building">Building</option>
            <option value="Electrical">Electrical</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Fire">Fire</option>
            <option value="Other">Other</option>
        </select>

        <select id="statusFilter" onchange="filterInspections()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Scheduled">Scheduled</option>
            <option value="Passed">Passed</option>
            <option value="Failed">Failed</option>
            <option value="Pending">Pending</option>
        </select>

        <button onclick="clearInspectionFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Inspections Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Inspection #</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Type</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Date</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Inspector</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Location</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="inspectionsTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Add / Edit Inspection Modal -->
        <dialog id="inspectionModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-lg shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl" id="modalTitle">Schedule Inspection</div>
                    <button onclick="document.getElementById('inspectionModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="inspectionForm" onsubmit="saveInspection(event)">
                    <input type="hidden" id="inspectionId">

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Inspection Type</label>
                            <select id="inspection_type" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="Building">Building</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Plumbing">Plumbing</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Fire">Fire</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Scheduled Date</label>
                                <input type="date" id="scheduled_date" required
                                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                            </div>
                            <div>
                                <label class="block text-sm text-zinc-400 mb-1.5">Time</label>
                                <input type="time" id="scheduled_time"
                                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Inspector / Agency</label>
                            <input type="text" id="inspector" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Location / Area</label>
                            <input type="text" id="location" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Notes</label>
                            <textarea id="notes" rows="2"
                                      class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"></textarea>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('inspectionModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Save Inspection
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
        <!-- JavaScript -->
        <script>
            // Sample data (will be replaced with backend later)
            let inspections = [
                {
                    id: 1,
                    inspection_number: "INSP-014",
                    type: "Electrical",
                    scheduled_date: "2025-04-08",
                    scheduled_time: "09:00",
                    inspector: "County Electrical Inspector",
                    location: "2nd Floor Electrical Room",
                    status: "Scheduled",
                    notes: "Rough-in inspection"
                },
                {
                    id: 2,
                    inspection_number: "INSP-013",
                    type: "Plumbing",
                    scheduled_date: "2025-04-03",
                    scheduled_time: "14:00",
                    inspector: "City Plumbing Dept.",
                    location: "Main Restrooms",
                    status: "Passed",
                    notes: "All fixtures installed correctly"
                },
                {
                    id: 3,
                    inspection_number: "INSP-015",
                    type: "Building",
                    scheduled_date: "2025-04-10",
                    scheduled_time: "10:30",
                    inspector: "Building Official",
                    location: "Entire Building",
                    status: "Pending",
                    notes: "Final building inspection"
                }
            ];

            function filterInspections() {
                const searchTerm = document.getElementById('inspectionSearch').value.toLowerCase();
                const typeFilter = document.getElementById('typeFilter').value;
                const statusFilter = document.getElementById('statusFilter').value;

                const filtered = inspections.filter(inspection => {
                    const matchesSearch = inspection.inspection_number.toLowerCase().includes(searchTerm) || 
                                        inspection.inspector.toLowerCase().includes(searchTerm);
                    const matchesType = !typeFilter || inspection.type === typeFilter;
                    const matchesStatus = !statusFilter || inspection.status === statusFilter;
                    return matchesSearch && matchesType && matchesStatus;
                });

                renderInspectionsTable(filtered);
            }

            function clearInspectionFilters() {
                document.getElementById('inspectionSearch').value = '';
                document.getElementById('typeFilter').value = '';
                document.getElementById('statusFilter').value = '';
                renderInspectionsTable(inspections);
            }

            function renderInspectionsTable(inspectionList) {
                const tbody = document.getElementById('inspectionsTableBody');
                tbody.innerHTML = '';

                if (inspectionList.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-zinc-400">
                                No inspections found.
                            </td>
                        </tr>
                    `;
                    return;
                }

                inspectionList.forEach(inspection => {
                    const statusColor = 
                        inspection.status === 'Passed' ? 'bg-emerald-600/20 text-emerald-400' :
                        inspection.status === 'Failed' ? 'bg-red-600/20 text-red-400' :
                        inspection.status === 'Scheduled' ? 'bg-blue-600/20 text-blue-400' :
                        'bg-amber-600/20 text-amber-400';

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-zinc-800/60 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${inspection.inspection_number}</td>
                        <td class="px-6 py-4">${inspection.type}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${inspection.scheduled_date} ${inspection.scheduled_time || ''}</td>
                        <td class="px-6 py-4">${inspection.inspector}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${inspection.location}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${statusColor}">
                                ${inspection.status}
                            </span>
                        </td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1">
                                <button onclick="editInspection(${inspection.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-edit"></i>
                                </button>
                                <button onclick="deleteInspection(${inspection.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function showAddInspectionModal() {
                document.getElementById('modalTitle').innerText = 'Schedule Inspection';
                document.getElementById('inspectionForm').reset();
                document.getElementById('inspectionId').value = '';
                document.getElementById('inspectionModal').showModal();
            }

            function editInspection(id) {
                const inspection = inspections.find(i => i.id === id);
                if (!inspection) return;

                document.getElementById('modalTitle').innerText = 'Edit Inspection';
                document.getElementById('inspectionId').value = inspection.id;
                document.getElementById('inspection_type').value = inspection.type;
                document.getElementById('scheduled_date').value = inspection.scheduled_date;
                document.getElementById('scheduled_time').value = inspection.scheduled_time || '';
                document.getElementById('inspector').value = inspection.inspector;
                document.getElementById('location').value = inspection.location;
                document.getElementById('notes').value = inspection.notes || '';

                document.getElementById('inspectionModal').showModal();
            }

            function saveInspection(e) {
                e.preventDefault();

                const id = document.getElementById('inspectionId').value;

                const newInspection = {
                    id: id ? parseInt(id) : Date.now(),
                    inspection_number: id ? inspections.find(i => i.id == id).inspection_number : `INSP-${String(inspections.length + 1).padStart(3, '0')}`,
                    type: document.getElementById('inspection_type').value,
                    scheduled_date: document.getElementById('scheduled_date').value,
                    scheduled_time: document.getElementById('scheduled_time').value,
                    inspector: document.getElementById('inspector').value,
                    location: document.getElementById('location').value,
                    status: id ? inspections.find(i => i.id == id).status : 'Scheduled',
                    notes: document.getElementById('notes').value
                };

                if (id) {
                    const index = inspections.findIndex(i => i.id == id);
                    inspections[index] = newInspection;
                } else {
                    inspections.push(newInspection);
                }

                renderInspectionsTable(inspections);
                document.getElementById('inspectionModal').close();
            }

            function deleteInspection(id) {
                if (!confirm('Delete this inspection?')) return;
                inspections = inspections.filter(i => i.id !== id);
                renderInspectionsTable(inspections);
            }

            function initializeInspections() {
                renderInspectionsTable(inspections);
            }

            // Initialize on load
            window.onload = function() {
                initializeInspections();
            };
        </script>

{% endblock %}

</div>
</div>
