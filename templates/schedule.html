{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Schedule</h1>
            <p class="text-zinc-400 mt-1">Project timeline and task management</p>
        </div>
        
        <div class="flex items-center gap-3">
            <!-- View Toggle -->
            <div class="flex bg-zinc-900 border border-zinc-800 rounded-2xl p-1">
                <button onclick="switchView('list')" id="listViewBtn"
                        class="px-4 py-2 text-sm rounded-xl bg-zinc-800 flex items-center gap-2 active-view">
                    <i class="fa-solid fa-list"></i>
                    <span>List</span>
                </button>
                <button onclick="switchView('gantt')" id="ganttViewBtn"
                        class="px-4 py-2 text-sm rounded-xl hover:bg-zinc-800 flex items-center gap-2">
                    <i class="fa-solid fa-chart-gantt"></i>
                    <span>Gantt</span>
                </button>
            </div>

            <button onclick="showAddTaskModal()" 
                    class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
                <i class="fa-solid fa-plus"></i>
                <span>Add Task</span>
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="scheduleSearch" placeholder="Search tasks..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterSchedule()">
        </div>

        <select id="statusFilter" onchange="filterSchedule()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Statuses</option>
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Delayed">Delayed</option>
        </select>

        <select id="assigneeFilter" onchange="filterSchedule()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Assignees</option>
            <!-- Populated dynamically via JS or backend -->
        </select>

        <button onclick="clearFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Schedule Content -->
    <div id="scheduleContent">
        
        <!-- List View -->
        <div id="listView">
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-zinc-800 bg-zinc-950">
                            <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Task</th>
                            <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Start Date</th>
                            <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">End Date</th>
                            <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Assigned To</th>
                            <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Status</th>
                            <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Progress</th>
                            <th class="w-12"></th>
                        </tr>
                    </thead>
                    <tbody id="scheduleTableBody" class="divide-y divide-zinc-800">
                        <!-- Tasks will be populated here via JavaScript or Jinja loop -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Gantt View (Placeholder for now) -->
        <div id="ganttView" class="hidden">
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 text-center">
                <i class="fa-solid fa-chart-gantt text-5xl text-zinc-600 mb-4"></i>
                <h3 class="text-xl font-semibold mb-2">Gantt Chart View</h3>
                <p class="text-zinc-400 max-w-md mx-auto">Gantt chart view is coming soon. For now, please use the List view.</p>
            </div>
        </div>

    </div>
</div>
