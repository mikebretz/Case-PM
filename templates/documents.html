{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/documents-app.css') }}">

<div class="docs-app max-w-[1800px] mx-auto flex flex-col h-[calc(100vh-5rem)] min-h-[600px]">
    <header class="docs-header flex flex-wrap items-center justify-between gap-3 mb-4 shrink-0">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight">Documents</h1>
            <p class="text-zinc-500 text-sm mt-0.5">Project files — folders, sharing, and downloads like Dropbox</p>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
            <select id="docsProjectSelect" class="docs-select" title="Project">
                {% for p in projects %}
                <option value="{{ p.id }}" {% if active_project and active_project.id == p.id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
            <button type="button" id="docsBtnNewFolder" class="docs-btn docs-btn-secondary"><i class="fa-solid fa-folder-plus"></i> New folder</button>
            <button type="button" id="docsBtnUpload" class="docs-btn docs-btn-primary"><i class="fa-solid fa-upload"></i> Upload</button>
            <input type="file" id="docsFileInput" class="hidden" multiple>
        </div>
    </header>

    <div class="docs-toolbar flex flex-wrap items-center gap-2 mb-3 shrink-0">
        <nav id="docsBreadcrumbs" class="docs-breadcrumbs flex-1 min-w-0"></nav>
        <div class="flex items-center gap-1">
            <button type="button" id="docsViewGrid" class="docs-icon-btn active" title="Grid view"><i class="fa-solid fa-grip"></i></button>
            <button type="button" id="docsViewList" class="docs-icon-btn" title="List view"><i class="fa-solid fa-list"></i></button>
        </div>
        <input type="search" id="docsSearch" class="docs-search" placeholder="Search this folder…">
    </div>

    <div class="docs-body flex flex-1 min-h-0 gap-3">
        <aside id="docsTree" class="docs-tree shrink-0 hidden lg:block"></aside>
        <main class="docs-main flex-1 min-w-0 flex flex-col bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
            <div id="docsDropZone" class="docs-dropzone flex-1 overflow-auto p-4">
                <div id="docsGrid" class="docs-grid"></div>
                <div id="docsEmpty" class="hidden text-center text-zinc-500 py-16">
                    <i class="fa-solid fa-folder-open text-4xl mb-3 block text-zinc-600"></i>
                    <p>Drop files here or use Upload</p>
                </div>
            </div>
        </main>
    </div>
</div>

<dialog id="docsShareDialog" class="docs-dialog">
    <div class="p-6">
        <h2 class="text-lg font-semibold mb-1">Share link</h2>
        <p class="text-xs text-zinc-500 mb-4">Anyone with this link can download the file — like Dropbox or OneDrive.</p>
        <input type="text" id="docsShareUrl" class="docs-input w-full mb-3" readonly>
        <div class="flex gap-2">
            <button type="button" id="docsShareCopy" class="docs-btn docs-btn-primary flex-1"><i class="fa-solid fa-copy"></i> Copy link</button>
            <button type="button" id="docsShareClose" class="docs-btn docs-btn-secondary flex-1">Close</button>
        </div>
        <div id="docsShareMeta" class="text-[10px] text-zinc-500 mt-3"></div>
    </div>
</dialog>

<dialog id="docsRenameDialog" class="docs-dialog">
    <div class="p-6">
        <h2 class="text-lg font-semibold mb-3">Rename</h2>
        <input type="text" id="docsRenameInput" class="docs-input w-full mb-4">
        <div class="flex gap-2">
            <button type="button" id="docsRenameCancel" class="docs-btn docs-btn-secondary flex-1">Cancel</button>
            <button type="button" id="docsRenameSave" class="docs-btn docs-btn-primary flex-1">Save</button>
        </div>
    </div>
</dialog>

<script src="{{ url_for('static', filename='js/documents-app.js') }}"></script>
{% endblock %}
