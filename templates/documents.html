{% extends "base.html" %}

{% block content %}
<div class="max-w-[1600px] mx-auto">
    
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">Documents</h1>
            <p class="text-zinc-400 mt-1">Project documentation and files</p>
        </div>
        
        <button onclick="showUploadDocumentModal()" 
                class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium transition-colors">
            <i class="fa-solid fa-upload"></i>
            <span>Upload Document</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-6 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
        <div class="flex-1 min-w-[220px]">
            <input type="text" id="documentSearch" placeholder="Search documents..." 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600"
                   onkeyup="filterDocuments()">
        </div>

        <select id="typeFilter" onchange="filterDocuments()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Types</option>
            <option value="Specification">Specifications</option>
            <option value="Contract">Contracts</option>
            <option value="Drawing">Drawings</option>
            <option value="Submittal">Submittals</option>
            <option value="Other">Other</option>
        </select>

        <select id="projectFilter" onchange="filterDocuments()" 
                class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
            <option value="">All Projects</option>
        </select>

        <button onclick="clearDocumentFilters()" 
                class="px-4 py-2.5 text-sm bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl transition-colors">
            Clear Filters
        </button>
    </div>

    <!-- Documents Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950">
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Document Name</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Type</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Project</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-zinc-400">Uploaded</th>
                    <th class="text-center px-6 py-4 text-sm font-medium text-zinc-400">Size</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody id="documentsTableBody" class="divide-y divide-zinc-800">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>
        <!-- Upload Document Modal -->
        <dialog id="uploadDocumentModal" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-0 w-full max-w-lg shadow-2xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-5">
                    <div class="font-semibold text-xl">Upload Document</div>
                    <button onclick="document.getElementById('uploadDocumentModal').close()" class="text-zinc-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>

                <form id="uploadDocumentForm" onsubmit="uploadDocument(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Document Name</label>
                            <input type="text" id="doc_name" required
                                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Document Type</label>
                            <select id="doc_type" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="Specification">Specification</option>
                                <option value="Contract">Contract</option>
                                <option value="Drawing">Drawing</option>
                                <option value="Submittal">Submittal</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">Project</label>
                            <select id="doc_project" required
                                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-600">
                                <option value="">Select Project</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-1.5">File</label>
                            <input type="file" id="doc_file" required
                                   class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-2xl file:border-0 file:bg-zinc-700 hover:file:bg-zinc-600">
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="document.getElementById('uploadDocumentModal').close()"
                                class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium transition-colors">
                            Upload
                        </button>
                    </div>
                </form>
            </div>
        </dialog>
        <!-- JavaScript -->
        <script>
            // Sample data (will be replaced with backend later)
            let documents = [
                {
                    id: 1,
                    name: "Project Specifications - Rev 3",
                    type: "Specification",
                    project: "ALDI Lakeland",
                    uploaded: "2025-03-10",
                    size: "4.2 MB"
                },
                {
                    id: 2,
                    name: "Subcontractor Agreement - ABC Concrete",
                    type: "Contract",
                    project: "ALDI Lakeland",
                    uploaded: "2025-03-12",
                    size: "1.8 MB"
                },
                {
                    id: 3,
                    name: "Electrical Drawings - Level 2",
                    type: "Drawing",
                    project: "Wesley Chapel Retail",
                    uploaded: "2025-03-15",
                    size: "12.4 MB"
                }
            ];

            function filterDocuments() {
                const searchTerm = document.getElementById('documentSearch').value.toLowerCase();
                const typeFilter = document.getElementById('typeFilter').value;

                const filtered = documents.filter(doc => {
                    const matchesSearch = doc.name.toLowerCase().includes(searchTerm);
                    const matchesType = !typeFilter || doc.type === typeFilter;
                    return matchesSearch && matchesType;
                });

                renderDocumentsTable(filtered);
            }

            function clearDocumentFilters() {
                document.getElementById('documentSearch').value = '';
                document.getElementById('typeFilter').value = '';
                document.getElementById('projectFilter').value = '';
                renderDocumentsTable(documents);
            }

            function renderDocumentsTable(docs) {
                const tbody = document.getElementById('documentsTableBody');
                tbody.innerHTML = '';

                if (docs.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="px-6 py-8 text-center text-zinc-400">
                                No documents found.
                            </td>
                        </tr>
                    `;
                    return;
                }

                docs.forEach(doc => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-zinc-800/60 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium">${doc.name}</td>
                        <td class="px-6 py-4">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium bg-zinc-700 text-zinc-300">
                                ${doc.type}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${doc.project}</td>
                        <td class="px-6 py-4 text-sm text-zinc-400">${doc.uploaded}</td>
                        <td class="px-6 py-4 text-center text-sm text-zinc-400">${doc.size}</td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1">
                                <button onclick="viewDocument(${doc.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-white">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                                <button onclick="deleteDocument(${doc.id})" class="p-2 hover:bg-zinc-700 rounded-xl text-zinc-400 hover:text-red-400">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function showUploadDocumentModal() {
                document.getElementById('uploadDocumentModal').showModal();
            }

            function uploadDocument(e) {
                e.preventDefault();

                const newDoc = {
                    id: Date.now(),
                    name: document.getElementById('doc_name').value,
                    type: document.getElementById('doc_type').value,
                    project: "ALDI Lakeland", // placeholder
                    uploaded: new Date().toISOString().split('T')[0],
                    size: "2.1 MB"
                };

                documents.unshift(newDoc);
                renderDocumentsTable(documents);
                document.getElementById('uploadDocumentModal').close();
                e.target.reset();
            }

            function viewDocument(id) {
                const doc = documents.find(d => d.id === id);
                if (!doc) return;
                alert(`Viewing: ${doc.name}\n\n(This will open the document viewer in a future update.)`);
            }

            function deleteDocument(id) {
                if (!confirm('Delete this document?')) return;
                documents = documents.filter(d => d.id !== id);
                renderDocumentsTable(documents);
            }

            function initializeDocuments() {
                renderDocumentsTable(documents);
            }

            // Initialize on load
            window.onload = function() {
                initializeDocuments();
            };
        </script>

{% endblock %}

</div>
</div>
